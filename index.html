  <link rel="stylesheet" href="index.css">
</head>
<body>
  <header><h1>🌾 Rice Product Catalog</h1></header>

  <div class="controls">
    <input type="text" id="search" placeholder="🔍 Search Rice Name...">
    <select id="category">
      <option value="">📂 All Categories</option>
      <option value="Akshaya Ponni">Akshaya Ponni</option>
      <option value="Basmati">Basmati</option>
      <option value="HMT Rice">HMT Rice</option>
      <option value="Idly Rice">Idly Rice</option>
      <option value="Jeera Rice">Jeera Rice</option>
      <option value="Nei Kitchadi">Nei Kitchadi</option>
      <option value="Rajapogam">Rajapogam</option>
      <option value="Seeraga Samba">Seeraga Samba</option>
    </select>
  </div>

  <div class="list" id="list"></div>
  <div class="spinner" id="spinner"><div></div></div>

  <!-- Popup -->
  <div class="popup" id="popup"><img id="popupImg" src="" alt=""></div>

  <!-- WhatsApp Floating Button -->
  <a href="https://wa.me/918667423739" target="_blank" class="whatsapp">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" />
  </a>

  <script src="index.js"></script>

</html>
